version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: foodtruck-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-foodtruck}
      POSTGRES_USER: ${POSTGRES_USER:-foodtruck}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-foodtruck}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-foodtruck} -d ${POSTGRES_DB:-foodtruck}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:

